version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/orchestrator"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      tooling:
        patterns:
          - "typescript"
          - "eslint*"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
